<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>옥탄가 계산기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Apple SD Gothic Neo', sans-serif;
      padding: 20px;
      margin: 0;
      max-width: 500px;
      margin: auto;
      background-color: #f9f9f9;
    }
    h1 {
      font-size: 24px;
      text-align: center;
      margin-bottom: 20px;
    }
    .tabs {
      display: flex;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px;
      background: #eee;
      border-radius: 8px 8px 0 0;
      margin-right: 5px;
      font-weight: bold;
      transition: 0.2s;
    }
    .tab.active {
      background-color: #ff4d4d;
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .section {
      margin-bottom: 20px;
      padding: 15px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input {
      padding: 10px;
      margin-top: 5px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background-color: #ff4d4d;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      width: 100%;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #e63e3e;
    }
    .result {
      margin-top: 20px;
      font-size: 17px;
      background: #fff;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <h1>옥탄가 계산기</h1>

  <!-- ✅ 탭 메뉴 -->
  <div class="tabs">
    <div class="tab active" data-tab="avg">평균 옥탄가 계산</div>
    <div class="tab" data-tab="sim">목표 옥탄가 계산</div>
  </div>

  <!-- ✅ 평균 옥탄가 계산기 -->
  <div class="tab-content active" id="avg">
    <div class="section">
      <label>내 차량 연료탱크 크기 (L)</label>
      <input type="number" id="tankSize" placeholder="50">

      <h4>🚗 고급유</h4>
      <label>금액 (원)</label>
      <input type="text" id="premiumPrice" placeholder="예: 30,000">

      <label>리터당 가격 (원)</label>
      <input type="number" id="premiumPerLiter" placeholder="예: 1850">

      <h4>⛽ 일반유</h4>
      <label>금액 (원)</label>
      <input type="text" id="regularPrice" placeholder="예: 30,000">

      <label>리터당 가격 (원)</label>
      <input type="number" id="regularPerLiter" placeholder="예: 1630">

      <button id="calcAvgBtn">평균 옥탄가 계산</button>

      <div class="result" id="result"></div>
    </div>
  </div>

  <!-- ✅ 목표 옥탄가 시뮬레이터 -->
  <div class="tab-content" id="sim">
    <div class="section">
      <label>목표 옥탄가</label>
      <input type="number" id="targetOctane" placeholder="예: 95">

      <label>현재 탱크 잔여량 (L) (선택)</label>
      <input type="number" id="currentFuel" placeholder="예: 10">

      <label>탱크 총 용량 (L)</label>
      <input type="number" id="tankSizeSim" placeholder="예: 50">

      <button id="simulateBtn">추천 비율 시뮬레이션</button>

      <div class="result" id="simResult"></div>
    </div>
  </div>

  <!-- ✅ jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

  <script>
    // ✅ 탭 전환
    $('.tab').click(function(){
      var tab_id = $(this).data('tab');

      $('.tab').removeClass('active');
      $('.tab-content').removeClass('active');

      $(this).addClass('active');
      $('#' + tab_id).addClass('active');
    });

    // ✅ 천 단위 콤마 함수
    function addComma(value) {
      return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function removeComma(value) {
      return value.replace(/,/g, "");
    }

    // ✅ 금액 입력 시 실시간 콤마
    $('#premiumPrice, #regularPrice').on('keyup', function() {
      let val = $(this).val().replace(/[^0-9]/g, "");
      $(this).val(addComma(val));
    });

    // ✅ 평균 옥탄가 계산
    $('#calcAvgBtn').click(function() {
      const tankSize = parseFloat($('#tankSize').val()) || 50;
      const premiumPrice = parseFloat(removeComma($('#premiumPrice').val())) || 0;
      const premiumPerLiter = parseFloat($('#premiumPerLiter').val()) || 1;
      const regularPrice = parseFloat(removeComma($('#regularPrice').val())) || 0;
      const regularPerLiter = parseFloat($('#regularPerLiter').val()) || 1;

      const premiumLiter = premiumPrice / premiumPerLiter;
      const regularLiter = regularPrice / regularPerLiter;
      const totalLiter = premiumLiter + regularLiter;

      const avgOctane = totalLiter === 0 ? 0 : (
        (premiumLiter * 100 + regularLiter * 91) / totalLiter
      );

      const fillPercent = tankSize > 0 ? (totalLiter / tankSize * 100) : 0;

      $('#result').html(`
        ✅ 총 주유량: <b>${totalLiter.toFixed(2)} L</b><br>
        ✅ 평균 옥탄가: <b>${avgOctane.toFixed(2)}</b><br>
        ✅ 고급유 비율: <b>${(premiumLiter / totalLiter * 100).toFixed(1)}%</b><br>
        ✅ 연료탱크의 <b>${fillPercent.toFixed(1)}%</b> 충전됨
      `);
    });

    // ✅ 목표 옥탄가 시뮬레이터
    $('#simulateBtn').click(function() {
      const targetOctane = parseFloat($('#targetOctane').val()) || 0;
      const currentFuel = parseFloat($('#currentFuel').val()) || 0;
      const tankSize = parseFloat($('#tankSizeSim').val()) || 0;

      const maxAddable = tankSize - currentFuel;
      const currentOctane = 91;

      const A = targetOctane * (currentFuel + maxAddable);
      const B = currentFuel * currentOctane + maxAddable * 91;

      const X = (A - B) / (100 - 91);
      const Y = maxAddable - X;

      const finalOctane = (currentFuel*currentOctane + X*100 + Y*91) / (currentFuel + X + Y);
      const fillPercent = ((currentFuel + X + Y)/tankSize*100).toFixed(1);

      $('#simResult').html(`
        ✅ 추천 조합:<br>
        - 고급유: <b>${X.toFixed(2)} L</b><br>
        - 일반유: <b>${Y.toFixed(2)} L</b><br>
        ✅ 예상 평균 옥탄가: <b>${finalOctane.toFixed(2)}</b><br>
        ✅ 예상 탱크 충전: <b>${fillPercent}%</b>
      `);
    });
  </script>

</body>
</html>
